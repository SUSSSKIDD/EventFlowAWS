server:
  port: 8084

spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/reporting_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

openrouter:
  api-url: https://openrouter.ai/api/v1/chat/completions
  api-key: ${OPENROUTER_API_KEY:mock-key}
  model: ${OPENROUTER_MODEL:openai/gpt-oss-120b:free}

google:
  docs:
    document-id: ${GOOGLE_DOCS_DOCUMENT_ID:1SuhZYBnUBdGH_PccfNVfko5Vor2E89tR9s5tYwKseHw}
