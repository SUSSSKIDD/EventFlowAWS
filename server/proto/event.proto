syntax = "proto3";

package com.eventflow.proto;

option java_multiple_files = true;
option java_package = "com.eventflow.proto";
option go_package = "server/ingestion-service-go/proto";

message AnalyticsEventProto {
  string event_id = 1;
  string project_id = 2;
  string user_id = 3;
  string event_name = 4;
  string properties_json = 5;
  int64 timestamp_millis = 6;
}
